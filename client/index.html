<!doctype html>
<html lang="zh-TW">

  <head>
    <meta charset="UTF-8" />
    <!-- Accessibility: no maximum-scale (WCAG 1.4.4 — users must be able to zoom).
         interactive-widget=resizes-content: when the on-screen keyboard opens,
         the layout viewport shrinks so a bottom-pinned composer (Agent Chat on
         mobile) is pushed up above the keyboard instead of being covered. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <!-- Round 80.7: title + ALL meta tags (description / keywords / og:* /
         twitter:*) and the duplicate Schema.org JSON-LD have been removed.
         react-helmet-async (in client/src/components/SEO.tsx) now exclusively
         owns these — keeping them static here was creating BOTH copies in the
         DOM at runtime, with crawlers picking up the wrong (default) one.
         Static title is kept as a brief flash-of-loading fallback only. -->
    <title>PACK&GO 旅行社</title>
    <!-- Round 80.25: removed static robots meta. Default crawler behavior is
         index/follow when absent. <SEO noindex> in React adds the explicit
         "noindex, nofollow" tag for private pages — having both caused
         duplicate robots tags in DOM. -->


    <!-- PWA manifest + favicon / apple touch icon -->
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/images/logo-bag-black-v3.png" />
    <!-- v2 Wave 4 Module 4.1 (2026-05-22): iOS home-screen icon. 180×180
         non-transparent square; iOS applies its own rounded-corner mask. -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/images/pwa/apple-touch-icon-180.png"
    />
    <!-- v2 Wave 4 Module 4.1 (2026-05-22): theme-color back to brand teal.
         CLAUDE.md §2.2 locks --primary: #0D9488 (Teal-600) as the brand.
         The previous Round 80.4 "off-brand" call was reversed by Jeff on
         2026-05-22; teal matches the splash screen + Android Chrome
         address-bar tint and is the canonical brand color. -->
    <meta name="theme-color" content="#0D9488" />

    <!-- Round 81 (2026-05-17) — iOS Add-to-Home-Screen support.
         Without these tags, Safari's "Add to Home Screen" launches the
         site in a browser-like view with the URL bar visible. With them,
         the installed icon launches as a fullscreen PWA — looks and feels
         like a native app.
         Jeff specifically wants admin (/admin) installable on iPhone so
         he can manage agent chats on the go without a native app build. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PACK&GO" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      Google tag (gtag.js) - GA4 G-91VLGFSK70
      CCPA/CPRA-compliant: the gtag.js <script> tag is NOT loaded here.
      It is injected by client/src/lib/analytics.ts loadGA4() AFTER the user
      accepts analytics cookies via the CookieConsentBanner. We still set up
      the dataLayer shim and Consent Mode defaults so that any custom events
      fired before consent are queued (not sent) with all storage denied.
    -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': 'denied',
        'functionality_storage': 'granted',
        'security_storage': 'granted'
      });
      gtag('js', new Date());
    </script>

    <!-- Round 80.7: LCP optimisation — preload the home hero fallback so it
         renders the moment the browser parses HTML, before React mounts.
         Critical because LCP was measuring 26s on Lighthouse mobile (cold
         tRPC + Unsplash). With this preload + fetchpriority=high, browser
         starts the image fetch in parallel with the JS bundle. -->
    <link
      rel="preload"
      as="image"
      href="/images/hero-sakura.webp"
      fetchpriority="high"
      type="image/webp" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Round 80.7: Press Start 2P removed from global font loading — only
         used in admin AiTeamRoster. Saved 1 HTTP request + parsing on every
         customer page load. Admin font falls back to monospace. -->

    <link rel="stylesheet" href="/src/print.css" media="print" />
    
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Round 80.7: removed dead Umami analytics script — VITE_ANALYTICS_*
         env vars were never set, so the literal "%VITE_ANALYTICS_ENDPOINT%"
         placeholder was being requested as a URL on every page (caught by
         full-scan audit). Real analytics are loaded conditionally from
         client/src/lib/analytics.ts after cookie consent (Plausible + GA4). -->
  </body>

</html>
