# fly.toml — PACK&GO travel booking site
# Deploy target: single region, auto-scaling off for first deploy
# Docs: https://fly.io/docs/reference/configuration/

app = "packgo-travel"
primary_region = "sjc"  # San Jose — closest to Jeff (Newark CA) + LionTravel HK/TW latency reasonable

[build]
  # Uses ./Dockerfile by default — no builder image needed

[deploy]
  # Run Drizzle migrations in a temporary machine BEFORE the new version goes live.
  # If this fails the deploy is aborted — prevents partially-migrated DBs.
  release_command = "node scripts/migrate.mjs"

[env]
  NODE_ENV      = "production"
  PORT          = "8080"
  # Non-secret defaults. Secrets (DATABASE_URL, JWT_SECRET, API keys) set via
  #   fly secrets set KEY=value

[http_service]
  internal_port       = 8080
  force_https         = true
  # auto-stop disabled: BullMQ background workers (AI tour gen, translation) run
  # for 2+ minutes after HTTP request returns. Fly proxy only sees HTTP activity
  # and would kill the machine mid-job. Keep 1 machine always running.
  auto_stop_machines  = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes           = ["app"]

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 200
    soft_limit = 150

  [[http_service.checks]]
    grace_period  = "30s"
    interval      = "15s"
    method        = "get"
    timeout       = "5s"
    path          = "/healthz"

[[vm]]
  # shared-cpu-2x / 1GB: enough for Vite SSR + Puppeteer spikes
  # downsize to shared-cpu-1x / 512MB once we know real load
  size   = "shared-cpu-2x"
  memory = "1gb"
  cpus   = 2

# Stateless — no persistent volumes. Uploaded files go to R2, DB to TiDB.
